<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Insurance | Tanza Doctors Hospital Inc.</title>
		<link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
		<link rel="stylesheet" href="vendor/fontawesome-free/css/all.min.css">
		<link rel="stylesheet" href="css/theme.css">
		<link rel="stylesheet" href="css/demos/demo-medical.css">
		<link id="skinCSS" rel="stylesheet" href="css/skins/skin-medical.css">

		<style>
			.insurance-grid-item img {
				height: 100px;
				width: auto;
				object-fit: contain;
				margin-bottom: 15px;
				transition: transform 0.3s ease;
			}
			.insurance-grid-item img:hover {
				transform: scale(1.05);
			}
			.pagination .page-item.active .page-link {
				background-color: #0088cc;
				border-color: #0088cc;
			}
		</style>
	</head>
	<body>
		<div class="body">
			<header id="header" class="header-effect-shrink" data-plugin-options="{'stickyEnabled': true, 'stickyEffect': 'shrink', 'stickyStartAt': 120}">
				<div class="header-body border-top-0">
					<div class="header-container container">
						<div class="header-row">
							<div class="header-logo"><img alt="Logo" width="250" src="img/logos/TDH-LOGO.png"></div>
						</div>
					</div>
				</div>
			</header>

			<div class="main">
				<section class="page-header page-header-modern bg-color-primary">
					<div class="container"><h1>Insurance</h1></div>
				</section>

				<div class="container text-center">
					<h2 class="mt-5">Our Accredited Health Partners</h2>
					
					<div class="row justify-content-center mb-5">
						<div class="col-md-6">
							<div class="input-group shadow-sm">
								<span class="input-group-text bg-color-primary text-white border-0"><i class="fas fa-search"></i></span>
								<input type="text" id="pageSearch" class="form-control" placeholder="Search on this page...">
							</div>
						</div>
					</div>

					<div class="content-grid mt-5 pb-5">
						<div class="row content-grid-row ps-3 pe-3">
							<div class="content-grid-item col-sm-4 insurance-grid-item" data-name="Valucare">
                                 <img src="img/demos/medical/logos/Valucare.png" alt="Valucare" class="img-fluid" />
                                    
                                </div>
							<div class="content-grid-item col-sm-4 insurance-grid-item" data-name="WealthCare">
								<img src="img/demos/medical/logos/wealthcare.png" alt="WealthCare" class="img-fluid" />
								
							</div>
							<div class="content-grid-item col-sm-4 insurance-grid-item" data-name="WellCare">
								<img src="img/demos/medical/logos/wellcare.png" alt="WellCare" class="img-fluid" />
								
							</div>
						</div>
					</div>

					<nav aria-label="Page navigation">
						<ul class="pagination justify-content-center">
							<li class="page-item"><a class="page-link" href="demo-medical-insurance3.html">Previous</a></li>
							<li class="page-item"><a class="page-link" href="demo-medical-insurance.html">1</a></li>
							<li class="page-item"><a class="page-link" href="demo-medical-insurance2.html">2</a></li>
							<li class="page-item"><a class="page-link" href="demo-medical-insurance3.html">3</a></li>
							<li class="page-item active"><a class="page-link" href="demo-medical-insurance4.html">4</a></li>
							<li class="page-item disabled"><span class="page-link">Next</span></li>
						</ul>
					</nav>
				</div>
			</div>
		</div>

		<script src="vendor/plugins/js/plugins.min.js"></script>
		<script>
			document.getElementById('pageSearch').addEventListener('keyup', function() {
				let filter = this.value.toLowerCase();
				let items = document.querySelectorAll('.insurance-grid-item');
				items.forEach(function(item) {
					let name = item.getAttribute('data-name').toLowerCase();
					item.style.display = name.includes(filter) ? "" : "none";
				});
			});
		</script>
	</body>
</html>
